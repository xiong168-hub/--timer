<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            background: #e0e0e0;
            color: #666;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .timer-display {
            font-size: 80px;
            font-weight: bold;
            color: #333;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .control-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .start-btn {
            background: #667eea;
            color: white;
        }

        .start-btn:hover {
            background: #5a6fd6;
            transform: scale(1.05);
        }

        .pause-btn {
            background: #ffa726;
            color: white;
        }

        .pause-btn:hover {
            background: #fb8c00;
            transform: scale(1.05);
        }

        .reset-btn {
            background: #ef5350;
            color: white;
        }

        .reset-btn:hover {
            background: #e53935;
            transform: scale(1.05);
        }

        .status {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍅 番茄钟</h1>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="time10">10分钟</button>
            <button class="mode-btn" id="time15">15分钟</button>
            <button class="mode-btn" id="time25">25分钟</button>
        </div>

        <div class="timer-display" id="timer">25:00</div>

        <div class="controls">
            <button class="control-btn start-btn" id="startBtn">开始</button>
            <button class="control-btn pause-btn" id="pauseBtn" style="display: none;">暂停</button>
            <button class="control-btn reset-btn" id="resetBtn">重置</button>
        </div>

        <div class="status" id="status">准备开始 25 分钟倒计时</div>
    </div>

    <script>
        let currentTime = 25; 
        let timeLeft = 25 * 60; 
        let timerInterval = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const time10Btn = document.getElementById('time10');
        const time15Btn = document.getElementById('time15');
        const time25Btn = document.getElementById('time25');
        const statusDiv = document.getElementById('status');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function setTime(minutes) {
            if (isRunning) return; 
            
            currentTime = minutes;
            timeLeft = minutes * 60;
            
            time10Btn.classList.remove('active');
            time15Btn.classList.remove('active');
            time25Btn.classList.remove('active');
            
            if (minutes === 10) {
                time10Btn.classList.add('active');
            } else if (minutes === 15) {
                time15Btn.classList.add('active');
            } else {
                time25Btn.classList.add('active');
            }
            
            statusDiv.textContent = `准备开始 ${minutes} 分钟倒计时`;
            updateDisplay();
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            statusDiv.textContent = '倒计时中...';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    startBtn.style.display = 'inline-block';
                    pauseBtn.style.display = 'none';
                    statusDiv.textContent = '时间到！';
                    playNotification();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
            statusDiv.textContent = '已暂停';
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
            
            setTime(currentTime);
        }

        function playNotification() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3;
                
                oscillator.start();
                
                setTimeout(() => {
                    oscillator.stop();
                }, 500);
            } catch (e) {
                console.log('Audio not supported');
            }
        }

        time10Btn.addEventListener('click', () => setTime(10));
        time15Btn.addEventListener('click', () => setTime(15));
        time25Btn.addEventListener('click', () => setTime(25));
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        updateDisplay();
    </script>
</body>
</html>
